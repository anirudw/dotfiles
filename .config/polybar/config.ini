[colors]
background = #272E33
background-alt = #374145
foreground = #D3C6AA
primary = #A7C080
secondary = #DBBC7F
alert = #E67E80
disabled = #414B50
active-bg = #374145
active-fg = #A7C080
occupied-bg = #2E383C


[bar/main]
width = 100%
height = 28
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = "JetBrains Mono:style=Regular:size=11;2"
font-1 = "JetBrains Mono:style=Bold:size=11;2"
modules-left = bspwm
modules-center = xwindow
modules-right = date
padding-right = 2
border-bottom-size = 2

[module/bspwm]
type = internal/bspwm

# --- FOCUSED (The active workspace) ---
label-focused = %name%
# Only the background changes here
label-focused-background = ${colors.active-bg}
label-focused-foreground = ${colors.active-fg}
# No underline for a flatter, more minimalist look
label-focused-underline = 
label-focused-padding = 2
label-focused-margin = 0

# --- OCCUPIED (Has windows, but not active) ---
label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-occupied-margin = 0

# --- EMPTY (No windows) ---
label-empty = %name%
label-empty-background = ${colors.background}
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2
label-empty-margin = 0

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%

[module/date]
type = internal/date
interval = 5
date = "%b %d, %I:%M %p"
label = %date%
