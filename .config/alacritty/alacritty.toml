[window]
# Adds breathing room around the edges of the terminal
padding = { x = 15, y = 15 }
dynamic_padding = true

# Makes the terminal slightly transparent (requires picom to be running)
opacity = 0.85

[font]
size = 9.0

[font.normal]
family = "JetBrainsMono"
style = "Regular"

[font.bold]
family = "JetBrainsMono"
style = "Bold"

[font.italic]
family = "JetBrainsMono"
style = "Italic"

# A modern, sleek dark theme (Tokyo Night)
[colors.primary]
background = "#272E33"
foreground = "#D3C6AA"

[colors.normal]
black   = "#414B50"
red     = "#E67E80"
green   = "#A7C080"
yellow  = "#DBBC7F"
blue    = "#7FBBB3"
magenta = "#D699B6"
cyan    = "#83C092"
white   = "#D3C6AA"

[colors.bright]
black   = "#495156"
red     = "#E67E80"
green   = "#A7C080"
yellow  = "#DBBC7F"
blue    = "#7FBBB3"
magenta = "#D699B6"
cyan    = "#83C092"
white   = "#D3C6AA"
